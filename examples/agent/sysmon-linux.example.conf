<agent_config>
  <!--
    Example pattern for collecting Sysmon for Linux output.

    Adjust the path and log format to match your actual Sysmon for Linux
    deployment. This is intentionally a conservative example, not a universal
    drop-in path.
  -->

  <localfile>
    <location>/var/log/sysmon/sysmon.log</location>
    <log_format>syslog</log_format>
  </localfile>
</agent_config>